name: Validate

on:
  push:
    branches:
      - main
      - "release/**"
    paths:
      - "custom_components/groq/manifest.json"
      - "hacs.json"
      - "README.md"
      - ".github/workflows/validate.yaml"
  pull_request:
    paths:
      - "custom_components/groq/manifest.json"
      - "hacs.json"
      - "README.md"
      - ".github/workflows/validate.yaml"
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  validate-hacs:
    runs-on: "ubuntu-latest"
    steps:
      - uses: actions/checkout@v6
      - name: HACS validation
        uses: "hacs/action@main"
        with:
          category: "integration"
