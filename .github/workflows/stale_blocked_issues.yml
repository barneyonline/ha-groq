name: Stale Blocked Issues

on:
  schedule:
    - cron: "17 16 * * *"
  workflow_dispatch:

permissions:
  issues: write

jobs:
  close_inactive_issues:
    runs-on: ubuntu-latest
    steps:
      - name: Mark and close inactive blocked issues
        uses: actions/stale@v10
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          days-before-issue-stale: 14
          days-before-issue-close: 16
          days-before-pr-stale: -1
          days-before-pr-close: -1
          any-of-issue-labels: status/needs-diagnostics,status/blocked,question
          exempt-issue-labels: status/accepted,help wanted,good first issue
          stale-issue-label: status/stale
          stale-issue-message: >
            This issue is still waiting on reporter follow-up and has not had any activity for 14 days.
            If the requested details are not added within the next 16 days, it will be closed automatically.
          close-issue-message: >
            Closing this issue due to inactivity while it was waiting on reporter follow-up.
          close-issue-reason: not_planned
          remove-stale-when-updated: true
          operations-per-run: 100
