name: Comment Missing Diagnostics

on:
  issues:
    types:
      - labeled
      - unlabeled

permissions:
  issues: write

jobs:
  sync_comment:
    if: github.event.label.name == 'status/needs-diagnostics'
    runs-on: ubuntu-latest
    steps:
      - name: Create or remove diagnostics guidance comment
        uses: actions/github-script@v9
        with:
          script: |
            const { owner, repo } = context.repo;
            const issue = context.payload.issue;
            const marker = "<!-- codex:needs-diagnostics-guidance -->";
            const hasDiagnosticsLabel = issue.labels.some((label) =>
              (typeof label === "string" ? label : label.name) === "status/needs-diagnostics",
            );

            if (!issue.title?.startsWith("[Bug]:")) {
              return;
            }

            const comments = await github.paginate(github.rest.issues.listComments, {
              owner,
              repo,
              issue_number: issue.number,
              per_page: 100,
            });
            const existing = comments.find((comment) => comment.body?.includes(marker));

            if (!hasDiagnosticsLabel) {
              if (existing) {
                await github.rest.issues.deleteComment({
                  owner,
                  repo,
                  comment_id: existing.id,
                });
              }
              return;
            }

            const body = [
              marker,
              "Thanks for the report. This issue is currently blocked on additional diagnostics before triage can finish.",
              "",
              "In Home Assistant:",
              "1. Open `Settings -> Devices & Services -> Integrations`",
              "2. Select `Groq`",
              "3. Use `Download diagnostics`",
              "4. Attach the generated file to this issue",
              "",
              "Also include the affected Groq service, Home Assistant entity or action, selected model or voice, and redacted logs if the issue involves a service call. Do not include Groq API keys or private prompt/media content.",
            ].join("\n");

            if (existing) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existing.id,
                body,
              });
              return;
            }
            await github.rest.issues.createComment({
              owner,
              repo,
              issue_number: issue.number,
              body,
            });
