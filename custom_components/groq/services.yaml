generate_text:
  fields:
    config_entry_id:
      required: false
      selector:
        config_entry:
          integration: groq
    service_id:
      required: false
      example: Text Generation
      selector:
        select:
          custom_value: true
          options: []
    prompt:
      required: true
      example: Summarize the current home status for a notification.
      selector:
        text:
          multiline: true
    model:
      required: false
      selector:
        select:
          custom_value: true
          options:
            - label: OpenAI GPT-OSS 20B
              value: openai/gpt-oss-20b
            - label: OpenAI GPT-OSS 120B
              value: openai/gpt-oss-120b
            - label: OpenAI GPT-OSS Safeguard 20B
              value: openai/gpt-oss-safeguard-20b
            - label: Llama 4 Scout 17B
              value: meta-llama/llama-4-scout-17b-16e-instruct
            - label: Llama 3.1 8B Instant
              value: llama-3.1-8b-instant
            - label: Llama 3.3 70B Versatile
              value: llama-3.3-70b-versatile
            - label: Qwen 3 32B
              value: qwen/qwen3-32b
            - label: Groq Compound
              value: groq/compound
            - label: Groq Compound Mini
              value: groq/compound-mini
    system_prompt:
      required: false
      selector:
        text:
          multiline: true
    temperature:
      required: false
      selector:
        number:
          min: 0
          max: 2
          step: 0.1
          mode: slider
    max_tokens:
      required: false
      advanced: true
      selector:
        number:
          min: 1
          mode: box
    top_p:
      required: false
      advanced: true
      selector:
        number:
          min: 0
          max: 1
          step: 0.01
          mode: box
    stop:
      required: false
      advanced: true
      selector:
        text:
          multiline: true
    seed:
      required: false
      advanced: true
      selector:
        number:
          min: 0
          mode: box
    service_tier:
      required: false
      advanced: true
      selector:
        select:
          options:
            - label: Auto
              value: auto
            - label: On Demand
              value: on_demand
            - label: Flex
              value: flex
            - label: Performance
              value: performance
    reasoning_effort:
      required: false
      advanced: true
      selector:
        select:
          options:
            - label: Default
              value: default
            - label: None
              value: none
            - label: Low
              value: low
            - label: Medium
              value: medium
            - label: High
              value: high
    reasoning_format:
      required: false
      advanced: true
      selector:
        select:
          options:
            - label: Hidden
              value: hidden
            - label: Raw
              value: raw
            - label: Parsed
              value: parsed
    include_reasoning:
      required: false
      advanced: true
      selector:
        boolean:
    request_body_options:
      required: false
      advanced: true
      selector:
        object:
    schema:
      required: false
      advanced: true
      selector:
        object:
    schema_name:
      required: false
      advanced: true
      example: response
      selector:
        text:
    strict:
      required: false
      advanced: true
      selector:
        boolean:

