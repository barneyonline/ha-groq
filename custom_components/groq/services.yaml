transcribe_audio:
  fields:
    config_entry_id:
      required: false
      selector:
        config_entry:
          integration: groq
    service_id:
      required: false
      example: Speech-to-Text
      selector:
        select:
          custom_value: true
          options: []
    audio_file:
      required: false
      selector:
        media:
          accept:
            - audio/*
    audio_path:
      required: false
      advanced: true
      example: /config/www/recording.wav
      selector:
        text:
    model:
      required: false
      selector:
        select:
          custom_value: true
          options:
            - label: Whisper Large V3 Turbo
              value: whisper-large-v3-turbo
            - label: Whisper Large V3
              value: whisper-large-v3
    language:
      required: false
      selector:
        select:
          custom_value: true
          options:
            - label: English (United States)
              value: en-US
            - label: English (United Kingdom)
              value: en-GB
            - label: English
              value: en
            - label: German
              value: de-DE
            - label: Spanish
              value: es-ES
            - label: French
              value: fr-FR
            - label: Italian
              value: it-IT
            - label: Portuguese
              value: pt-PT
            - label: Dutch
              value: nl-NL
            - label: Japanese
              value: ja-JP
            - label: Korean
              value: ko-KR
            - label: Chinese
              value: zh-CN
    prompt:
      required: false
      advanced: true
      selector:
        text:
          multiline: true

