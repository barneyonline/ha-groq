analyze_image:
  fields:
    config_entry_id:
      required: false
      selector:
        config_entry:
          integration: groq
    service_id:
      required: false
      example: Image Recognition
      selector:
        select:
          custom_value: true
          options: []
    prompt:
      required: true
      example: Describe anything unusual in this camera image.
      selector:
        text:
          multiline: true
    camera_entity_id:
      required: false
      selector:
        entity:
          domain: camera
    image_file:
      required: false
      selector:
        media:
          accept:
            - image/*
    image_path:
      required: false
      advanced: true
      example: /config/www/snapshot.jpg
      selector:
        text:
    image_url:
      required: false
      advanced: true
      example: https://example.com/snapshot.jpg
      selector:
        text:
          type: url
    model:
      required: false
      selector:
        select:
          custom_value: true
          options:
            - label: Llama 4 Scout 17B
              value: meta-llama/llama-4-scout-17b-16e-instruct
            - label: Qwen 3.6 27B
              value: qwen/qwen3.6-27b
            - label: Llama 4 Maverick 17B
              value: meta-llama/llama-4-maverick-17b-128e-instruct

